<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <!-- Background -->
  <rect width="512" height="512" fill="#000"/>

  <!-- Grid pattern -->
  <defs>
    <pattern id="grid" width="64" height="64" patternUnits="userSpaceOnUse">
      <path d="M 64 0 L 0 0 0 64" fill="none" stroke="#1a1a2e" stroke-width="1"/>
    </pattern>
  </defs>
  <rect width="512" height="512" fill="url(#grid)"/>

  <!-- Border -->
  <rect x="16" y="16" width="480" height="480" stroke="#00ff88" stroke-width="4" fill="none" rx="32"/>

  <!-- GG Logo -->
  <text x="256" y="300" font-family="monospace" font-size="160" font-weight="bold" fill="#00ff88" text-anchor="middle">GG</text>

  <!-- Tagline -->
  <text x="256" y="380" font-family="sans-serif" font-size="24" fill="#666" text-anchor="middle">GRID GAMES</text>
</svg>
